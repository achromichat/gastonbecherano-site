<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaston Becherano</title>
  <link rel="icon" type="image/gif" href="/favicon.gif">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
      box-sizing: border-box;
    }
    a.video-link {
      display: block;
      max-width: 100%;
      max-height: 75vh;
      line-height: 0;
    }
    video {
      max-width: 100%;
      max-height: 75vh;
      object-fit: contain;
      display: block;
      cursor: pointer;
    }
    a.cta {
      display: inline-block;
      padding: 14px 36px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    a.cta:hover,
    a.cta:focus {
      background: #fff;
      color: #000;
      outline: none;
    }
  </style>
</head>
<body>
  <a class="video-link" href="https://omotenashigroup.com" aria-label="Visit Omotenashi Group">
    <video src="gaston.mp4" autoplay loop muted playsinline preload="auto"></video>
  </a>
  <a class="cta" href="https://omotenashigroup.com">Omotenashi Group</a>
</body>
</html>
